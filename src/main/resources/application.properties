
# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
spring.application.name=ai-exam-system


# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ai_exam_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=SEM@2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=thisisaverysecuresecretkeythisisaverysecuresecretkeythisisaverysecuresecretkey
jwt.expiration=86400000


# ===============================
# REDIS CONFIGURATION (Future Use)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379


# ===============================
# FILE UPLOAD (For Excel Questions)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# DEVTOOLS (AUTO RESTART)
# ===============================
spring.devtools.restart.enabled=true


# ===============================
# JACKSON JSON CONFIG
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false






