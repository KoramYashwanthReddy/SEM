<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile | SEM AI Exam System</title>
  <meta name="description" content="Manage your student profile in the SEM AI Exam System." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/core/css/themes.css">
  <link rel="stylesheet" href="../assets/pages/profile/css/profile.css">
</head>
<body class="student-profile-page">
  <div class="noise-overlay"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="profile-topbar">
    <div>
      <div class="eyebrow">Student Identity</div>
      <h1>Profile Management</h1>
    </div>
    <div class="topbar-actions">
      <div id="profile-status-chip" class="status-pill">Loading...</div>
      <a href="student-dashboard.html" class="btn btn-ghost">Back to Dashboard</a>
    </div>
  </header>

  <main class="profile-shell">
    <aside class="summary-panel">
      <div class="summary-card">
        <img id="profile-photo-preview" alt="Profile avatar" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" />
        <div>
          <div class="eyebrow">Current Student</div>
          <h2 id="summary-name">Student</h2>
          <p id="summary-email">-</p>
        </div>
      </div>

      <div class="summary-stats">
        <div>
          <span>Completion</span>
          <strong id="summary-completion">0%</strong>
        </div>
        <div>
          <span>Profile ID</span>
          <strong id="summary-id">-</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="summary-updated">-</strong>
        </div>
      </div>

      <p class="summary-copy">
        Keep your academic identity accurate for certificates, leaderboard entries, and verified student records.
      </p>
    </aside>

    <section class="editor-panel">
      <form id="student-profile-form" novalidate>
        <div class="editor-grid">
          <div class="field full">
            <label for="fullName">Full name</label>
            <input id="fullName" name="fullName" type="text" placeholder="Enter full name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" readonly>
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" placeholder="+1 555 000 0000">
          </div>
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="dateOfBirth">Date of birth</label>
            <input id="dateOfBirth" name="dateOfBirth" type="date">
          </div>
          <div class="field full">
            <label for="collegeName">College / University</label>
            <input id="collegeName" name="collegeName" type="text" placeholder="Institution name" required>
          </div>
          <div class="field">
            <label for="department">Department</label>
            <input id="department" name="department" type="text" placeholder="Department" required>
          </div>
          <div class="field">
            <label for="year">Year</label>
            <select id="year" name="year">
              <option value="">Select year</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
          </div>
          <div class="field">
            <label for="rollNumber">Roll number</label>
            <input id="rollNumber" name="rollNumber" type="text" placeholder="Roll number" required>
          </div>
          <div class="field">
            <label for="section">Section</label>
            <input id="section" name="section" type="text" placeholder="Section">
          </div>
          <div class="field full">
            <label for="profilePhotoFile">Profile photo</label>
            <div class="photo-row">
              <input id="profilePhotoFile" type="file" accept="image/*">
              <button type="button" id="profile-photo-btn" class="btn btn-ghost">Choose image</button>
              <span id="photo-name" class="file-label">No file selected</span>
            </div>
          </div>
        </div>

        <input type="hidden" id="profilePhotoData" value="">

        <div class="form-actions">
          <button type="button" id="profile-reset-btn" class="btn btn-ghost">Reset</button>
          <button type="submit" id="profile-save-btn" class="btn btn-primary">Save Profile</button>
        </div>
      </form>
    </section>
  </main>

  <div id="toast-root" class="toast-root"></div>

  <script src="../assets/core/js/theme.js"></script>
  <script src="../assets/pages/profile/js/profile.js"></script>
</body>
</html>
